<div class="card shadow-sm border-0 experiencia-card">
  <div class="card-body p-4">
    <div class="row g-4">
      <div class="col-12 col-lg-5">
        <h4 class="mb-1 fw-bold">{{ exp.empresa }}</h4>
        <p class="mb-2 fs-5">{{ exp.cargo }}</p>

        <p class="text-muted mb-0">
          {{ exp.fecha_inicio }}
          {% if exp.actual %}
            — Actualidad
          {% elif exp.fecha_termino %}
            — {{ exp.fecha_termino }}
          {% endif %}
        </p>
      </div>

      <div class="col-12 col-lg-7">
        {% if exp.descripcion %}
          <div class="expandable-text-wrapper">
            <p class="mb-0 text-secondary expandable-text experience-text js-expandable-text">
              {{ exp.descripcion }}
            </p>
            <button type="button" class="btn btn-outline-dark btn-sm mt-3 js-expand-toggle">
              Leer más
            </button>
          </div>
        {% else %}
          <p class="mb-0 text-muted">Sin descripción disponible.</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>
