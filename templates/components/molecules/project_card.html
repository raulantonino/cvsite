<div class="col-12 col-md-6 col-xl-4">
  <div class="card h-100 shadow-sm border-0 proyecto-card">
    <div class="card-body d-flex flex-column p-4">
      <h4 class="fw-bold mb-2">{{ p.nombre }}</h4>

      {% if p.tecnologias %}
        <p class="text-muted mb-3">{{ p.tecnologias }}</p>
      {% endif %}

      {% if p.descripcion %}
        <p class="mb-4 flex-grow-1">{{ p.descripcion }}</p>
      {% endif %}

      {% if p.url %}
        <a href="{{ p.url }}" target="_blank" rel="noopener" class="btn btn-outline-dark mt-auto">
          <i class="bi bi-github me-1"></i>Ver proyecto
        </a>
      {% endif %}
    </div>
  </div>
</div>
