{% extends "base.html" %}

{% block title %}Habilidades{% endblock %}

{% block content %}
<section class="py-5 js-reveal">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <h1 class="seccion-titulo mb-0">Habilidades</h1>
    <a href="{% url 'nueva_habilidad' %}" class="btn btn-dark">Nueva habilidad</a>
  </div>

  <div class="d-flex flex-column gap-3">
    {% for h in habilidades %}
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h5 class="mb-1">{{ h.nombre }}</h5>
            <p class="mb-0 text-muted">{{ h.categoria }}</p>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <a href="{% url 'editar_habilidad' h.id %}" class="btn btn-outline-dark btn-sm">Editar</a>
            <a href="{% url 'eliminar_habilidad' h.id %}" class="btn btn-outline-danger btn-sm">Eliminar</a>
          </div>
        </div>
      </div>
    {% empty %}
      <p>No hay habilidades creadas.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
