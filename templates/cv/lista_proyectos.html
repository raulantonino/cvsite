{% extends "base.html" %}

{% block title %}Proyectos{% endblock %}

{% block content %}
<section class="py-5 js-reveal">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <h1 class="seccion-titulo mb-0">Proyectos</h1>
    <a href="{% url 'nuevo_proyecto' %}" class="btn btn-dark">Nuevo proyecto</a>
  </div>

  <div class="d-flex flex-column gap-3">
    {% for p in proyectos %}
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h5 class="mb-1">{{ p.nombre }}</h5>
            <p class="mb-1 text-muted">{{ p.tecnologias }}</p>
          </div>

            <div class="d-flex gap-2 flex-wrap">
                <a href="{% url 'editar_proyecto' p.id %}" class="btn btn-outline-dark btn-sm">Editar</a>
                <a href="{% url 'eliminar_proyecto' p.id %}" class="btn btn-outline-danger btn-sm">Eliminar</a>
            </div>
        </div>
      </div>
    {% empty %}
      <p>No hay proyectos creados.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
